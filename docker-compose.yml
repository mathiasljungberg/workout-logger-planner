services:
  postgres:
    image: postgres:16-alpine
    container_name: workout_tracker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workout_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workout_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

